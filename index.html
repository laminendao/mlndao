<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mouhamadou Lamine NDAO</title>
</head>
<body>
    <div id="app">
        <div data-include="head.html"></div>
        <div data-include="nav.html"></div>
        <div data-include="sections.html"></div>
        <div data-include="footer.html"></div>
    </div>

    <script>
        async function includeHTML() {
            const includeElements = document.querySelectorAll('[data-include]');
            for (const elem of includeElements) {
                const fileName = elem.getAttribute('data-include');
                try {
                    const res = await fetch('partials/' + fileName);
                    if (res.ok) {
                        const template = await res.text();
                        const container = document.createElement('div');
                        container.innerHTML = template;

                        elem.replaceWith(...Array.from(container.childNodes));

                        // Exécuter scripts inclus
                        container.querySelectorAll('script').forEach(script => {
                            const newScript = document.createElement('script');
                            if (script.src) {
                                newScript.src = script.src;
                            } else {
                                newScript.textContent = script.textContent;
                            }
                            document.body.appendChild(newScript);
                        });
                    } else {
                        console.error('Impossible de charger', fileName, res.status);
                        elem.innerHTML = '<p style="color:red">Erreur chargement ' + fileName + '</p>';
                    }
                } catch (e) {
                    console.error('Erreur fetch', fileName, e);
                    elem.innerHTML = '<p style="color:red">Erreur fetch ' + fileName + '</p>';
                }
            }
        }

        function setTheme(theme) {
            document.body.setAttribute('data-theme', theme);
            localStorage.setItem('theme', theme);
            const toggle = document.getElementById('themeToggle');
            if (toggle) {
                toggle.innerText = theme === 'dark' ? '☀️' : '🌙';
            }
        }

        function setupThemeToggle() {
            const savedTheme = localStorage.getItem('theme') || 'dark';
            setTheme(savedTheme);

            const themeToggleBtn = document.getElementById('themeToggle');
            if (themeToggleBtn) {
                themeToggleBtn.addEventListener('click', () => {
                    const currentTheme = document.body.getAttribute('data-theme') || 'dark';
                    setTheme(currentTheme === 'dark' ? 'light' : 'dark');
                });
            }
        }

        document.addEventListener('DOMContentLoaded', async () => {
            console.log('DOM loaded, starting includeHTML...');
            await includeHTML();
            console.log('HTML included, setting up...');

            setupThemeToggle();

            console.log('Setup complete');
        });

        // Fonction pour gérer les publications accordéon
        function togglePublications(category) {
            const content = document.getElementById(category + '-content');
            const icon = content.previousElementSibling.querySelector('.toggle-icon');

            if (content.style.display === 'block') {
                content.style.display = 'none';
                icon.textContent = '▼';
            } else {
                content.style.display = 'block';
                icon.textContent = '▲';
            }
        }
    </script>
</body>
</html>
